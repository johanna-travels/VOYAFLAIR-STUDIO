<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOYAFLAIR | Cinematic Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #000; }
        .serif { font-family: 'Playfair Display', serif; }
        #side-menu { transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes slow-zoom { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }
        .animate-slow-zoom { animation: slow-zoom 20s ease-out infinite alternate; }
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
        .animate-marquee-infinite { display: flex; width: 200%; animation: marquee 20s linear infinite; }
    </style>
</head>
<body class="antialiased"> <section class="relative w-full min-h-screen bg-[#FDFDFB] py-10 px-4 md:py-16 md:px-6 font-sans flex flex-col items-center">
  
  <div class="w-full max-w-2xl mb-10 text-center">
    <h2 class="text-[#000000] text-3xl md:text-5xl tracking-tight mb-4 font-normal leading-tight">
      Let's Create Together
    </h2>
    <div class="text-[#69746E] text-base md:text-lg leading-relaxed">
      <p>Get in touch with me by filling out the form,</p> 
      <p>
        or send me an email at 
        <a href="mailto:voyaflair@gmail.com" class="text-[#4A574F] font-semibold underline decoration-[#4A574F]/30">
          voyaflair@gmail.com
        </a>
      </p>
    </div>
  </div>

  <div class="relative z-10 w-full max-w-xl bg-white p-6 md:p-8 rounded-xl shadow-sm border border-[#4A574F]/10">
    <form action="https://formspree.io/f/mnjgwzrw" method="POST" class="space-y-5">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-[#000000] text-xs font-bold mb-2 uppercase tracking-wide">First Name</label>
          <input type="text" name="first_name" placeholder="Your Name"
            class="w-full bg-[#FDFDFB] border border-[#4A574F]/20 rounded-md p-3 text-base text-black outline-none focus:border-[#3F4C46] transition-colors">
        </div>
        <div>
          <label class="block text-[#000000] text-xs font-bold mb-2 uppercase tracking-wide">Last Name</label>
          <input type="text" name="last_name" placeholder="Your Surname"
            class="w-full bg-[#FDFDFB] border border-[#4A574F]/20 rounded-md p-3 text-base text-black outline-none focus:border-[#3F4C46] transition-colors">
        </div>
      </div>

      <div>
        <label class="block text-[#000000] text-xs font-bold mb-2 uppercase tracking-wide">
          Email <span class="text-red-500">*</span>
        </label>
        <input type="email" name="email" required placeholder="email@example.com"
          class="w-full bg-[#FDFDFB] border border-[#4A574F]/20 rounded-md p-3 text-base text-black outline-none focus:border-[#3F4C46] transition-colors">
      </div>

      <div>
        <label class="block text-[#000000] text-xs font-bold mb-2 uppercase tracking-wide">
          Message <span class="text-red-500">*</span>
        </label>
        <textarea name="message" rows="4" required placeholder="How can I help you?"
          class="w-full bg-[#FDFDFB] border border-[#4A574F]/20 rounded-md p-3 text-base text-black outline-none focus:border-[#3F4C46] transition-colors"></textarea>
      </div>

      <button type="submit" 
        class="w-full bg-[#000000] text-[#FDFDFB] py-4 rounded-lg text-lg font-bold hover:bg-[#3F4C46] transition-all duration-300 cursor-pointer">
        Send Message
      </button>

    </form>
  </div>
</section>

</body>
</html>
