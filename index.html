<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOYAFLAIR | Cinematic Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        /* Side Menu Transition */
        #side-menu { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>
    <header class="fixed top-0 left-0 z-40 flex w-full items-center justify-between p-8 text-white mix-blend-difference md:px-12">
  <div class="text-[10px] font-light tracking-[0.4em] uppercase opacity-70">Est. 2026</div>
  <button id="menu-open" class="text-[10px] tracking-[0.4em] uppercase transition-colors duration-300 hover:text-white/60">Menu</button>
</header>

<div id="side-menu" class="fixed top-0 right-0 z-50 flex h-screen w-full translate-x-full transform flex-col justify-center border-l border-white/5 bg-zinc-950 px-12 transition-transform duration-[800ms] ease-[cubic-bezier(0.7,0,0.3,1)] md:w-[450px] md:px-20">
  <button id="menu-close" class="absolute top-8 right-8 text-[10px] tracking-[0.4em] text-white/40 uppercase transition-colors duration-300 hover:text-white md:right-12">Close</button>

 <nav class="flex flex-col gap-6">
  <div class="menu-item opacity-0 translate-y-8 transition-all duration-700 delay-300">
    <button id="work-toggle" class="group flex items-center gap-4 text-4xl font-extralight tracking-[0.1em] text-white/50 uppercase transition-all duration-500 hover:text-white">
      <span class="text-[10px] tracking-[0.2em] opacity-0 transition-opacity duration-500 group-hover:opacity-100">01</span>
      Work
      <span class="text-xs ml-2 opacity-30 group-hover:rotate-180 transition-transform duration-500">↓</span>
    </button>

    <div id="work-dropdown" class="grid grid-rows-[0fr] transition-all duration-500 ease-in-out overflow-hidden">
      <div class="min-h-0 flex flex-col gap-4 pl-12 mt-4">
        <a href="hotels.html" class="text-xl font-extralight tracking-[0.2em] text-white/30 hover:text-white transition-colors"target="_blank">Hotels</a>
        <a href="villas.html" class="text-xl font-extralight tracking-[0.2em] text-white/30 hover:text-white transition-colors">Villas</a>
        <a href="lifestyle.html" class="text-xl font-extralight tracking-[0.2em] text-white/30 hover:text-white transition-colors">Lifestyle</a>
      </div>
    </div>
  </div>

  <div class="menu-item opacity-0 translate-y-8 transition-all duration-700 delay-500">
    <a href="#" class="group flex items-center gap-4 text-4xl font-extralight tracking-[0.1em] text-white/50 uppercase transition-all duration-500 hover:text-white">
      <span class="text-[10px] tracking-[0.2em] opacity-0 transition-opacity duration-500 group-hover:opacity-100">02</span>
      Studio
    </a>
  </div>

  <div class="menu-item opacity-0 translate-y-8 transition-all duration-700 delay-700">
    <a href="#" class="group flex items-center gap-4 text-4xl font-extralight tracking-[0.1em] text-white/50 uppercase transition-all duration-500 hover:text-white">
      <span class="text-[10px] tracking-[0.2em] opacity-0 transition-opacity duration-500 group-hover:opacity-100">03</span>
      Contact
    </a>
  </div>
</nav>

  <div class="absolute bottom-12 left-12 text-[9px] tracking-[0.3em] text-white/30 uppercase md:left-20">
    <p>Voyaflair &copy; 2026</p>
  </div>
</div>

<main class="relative h-screen w-full overflow-hidden bg-black text-white antialiased">
  
  <div class="absolute inset-0 z-0">
    <img src="https://images.unsplash.com/photo-1494145904049-0dca59b4bbad?q=80&w=2000" alt="Cinematic Background" class="animate-slow-zoom h-full w-full scale-105 object-cover opacity-50" />
    <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/20 to-black/80"></div>
  </div>

  <div class="animate-fade-in relative z-10 flex h-full w-full items-center px-8 md:px-0">
    <div class="flex w-full flex-col items-start justify-center md:items-center">
      <h1 class="font-extralight tracking-[0.3em] uppercase transition-all duration-1000">
        <span class="block text-6xl md:hidden">VF</span>
        <span class="hidden text-7xl md:block lg:text-9xl">Voyaflair</span>
      </h1>

      <div class="mt-6 flex flex-col items-start gap-5 md:items-center">
        <span class="h-[1px] w-12 bg-white/40"></span>
        <p class="max-w-[280px] text-left text-[9px] font-light tracking-[0.5em] text-white/50 uppercase md:max-w-none md:text-center md:text-xs">Cinematic Studio & Travel Aesthetics</p>
      </div>
    </div>
  </div>
</main>

<style>
  @keyframes slow-zoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.15); }
  }
  .animate-slow-zoom {
    animation: slow-zoom 30s linear infinite alternate;
  }

  @keyframes fade-in {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in {
    animation: fade-in 2s ease-out forwards;
  }
</style>

<script>
  const btnOpen = document.getElementById('menu-open');
  const btnClose = document.getElementById('menu-close');
  const sideMenu = document.getElementById('side-menu');
  const menuItems = document.querySelectorAll('.menu-item');

  btnOpen.addEventListener('click', () => {
    // 1. Ξεκινάει να μπαίνει η μαύρη κουρτίνα (κάνει 800ms)
    sideMenu.classList.remove('translate-x-full');
    
    // 2. Περιμένουμε 500ms να φανεί λίγο το μενού και ΜΕΤΑ δίνουμε το σύνθημα στα γράμματα!
    setTimeout(() => {
      menuItems.forEach(item => {
        item.classList.remove('opacity-0', 'translate-y-8');
        item.classList.add('opacity-100', 'translate-y-0');
      });
    }, 500);
  });

  btnClose.addEventListener('click', () => {
    // 1. Κλείνει η μαύρη κουρτίνα
    sideMenu.classList.add('translate-x-full');
    
    // 2. Κρύβουμε τα γράμματα αμέσως για να είναι έτοιμα την επόμενη φορά
    menuItems.forEach(item => {
      item.classList.add('opacity-0', 'translate-y-8');
      item.classList.remove('opacity-100', 'translate-y-0');
    });
  });


  //////////menu  dropdown//////////

// Πρόσθεσε αυτά μέσα στο script σου
const workToggle = document.getElementById('work-toggle');
const workDropdown = document.getElementById('work-dropdown');

workToggle.addEventListener('click', () => {
    // Ελέγχει αν είναι κλειστό (grid-rows-[0fr]) και το αλλάζει σε ανοιχτό (grid-rows-[1fr])
    if (workDropdown.classList.contains('grid-rows-[0fr]')) {
        workDropdown.classList.remove('grid-rows-[0fr]');
        workDropdown.classList.add('grid-rows-[1fr]');
        workToggle.classList.add('text-white'); // Κρατάει το Work φωτεινό
    } else {
        workDropdown.classList.remove('grid-rows-[1fr]');
        workDropdown.classList.add('grid-rows-[0fr]');
        workToggle.classList.remove('text-white');
    }
});
</script>
</body>
</html>
