<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotels Portfolio | VOYAFLAIR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; scroll-behavior: smooth; }
        .serif { font-family: 'Playfair Display', serif; }
        #side-menu { transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
    </style>
</head>
<body class="antialiased">

<header class="fixed top-0 left-0 z-40 flex w-full items-center justify-between p-6 md:p-10 text-white mix-blend-difference">
    <a href="index.html" class="text-[9px] font-light tracking-[0.5em] uppercase opacity-60 hover:opacity-100 transition-opacity">Voyaflair Studio</a>
    <button id="menu-open" class="group flex items-center gap-3">
        <span class="text-[9px] tracking-[0.4em] uppercase opacity-70 group-hover:opacity-100 transition-opacity">Explore</span>
        <div class="flex flex-col gap-1 w-4">
            <span class="h-[1px] w-full bg-white opacity-70 group-hover:opacity-100"></span>
            <span class="h-[1px] w-full bg-white opacity-70 group-hover:opacity-100"></span>
        </div>
    </button>
</header>

<div id="side-menu" class="fixed top-0 right-0 z-50 flex h-screen w-full translate-x-full transform flex-col justify-center border-l border-white/5 bg-[#050505] px-10 md:w-[400px] md:px-16">
    <button id="menu-close" class="absolute top-10 right-10 text-[9px] tracking-[0.4em] text-white/30 uppercase hover:text-white transition-colors">Close</button>
    <nav class="flex flex-col gap-10">
        <div class="menu-item opacity-0 translate-y-4 transition-all duration-700 delay-200">
            <a href="index.html#about" class="menu-link group flex items-baseline gap-4">
                <span class="text-[8px] tracking-widest opacity-30 serif italic">01</span>
                <span class="text-xl font-light tracking-[0.15em] uppercase text-white/60 group-hover:text-white">About</span>
            </a>
        </div>
        <div class="menu-item opacity-0 translate-y-4 transition-all duration-700 delay-300">
            <a href="hotels.html" class="menu-link group flex items-baseline gap-4">
                <span class="text-[8px] tracking-widest opacity-30 serif italic text-white">02</span>
                <span class="text-xl font-light tracking-[0.15em] uppercase text-white">Work</span>
            </a>
        </div>
        <div class="menu-item opacity-0 translate-y-4 transition-all duration-700 delay-400">
            <a href="index.html#services" class="menu-link group flex items-baseline gap-4">
                <span class="text-[8px] tracking-widest opacity-30 serif italic">03</span>
                <span class="text-xl font-light tracking-[0.15em] uppercase text-white/60 group-hover:text-white">Services</span>
            </a>
        </div>
        <div class="menu-item opacity-0 translate-y-4 transition-all duration-700 delay-500 text-white/60 hover:text-white transition-colors">
            <a href="contact.html" class="menu-link group flex items-baseline gap-4 font-light tracking-[0.15em] uppercase text-xl">
                <span class="text-[8px] tracking-widest opacity-30 serif italic">04</span> Contact
            </a>
        </div>
    </nav>
</div>

<main class="pt-40 px-6 md:px-20 lg:px-40 pb-32">
    <div class="mb-24">
        <h1 class="serif italic text-5xl md:text-7xl tracking-tighter text-white mb-6">Hospitality.</h1>
        <p class="text-[10px] tracking-[0.5em] uppercase text-zinc-500 max-w-md leading-relaxed">
            A curated selection of design-driven hotels and luxury resorts.
        </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-24">
        
        <a href="amanzoe.html" class="group block relative overflow-hidden">
            <div class="aspect-[4/5] overflow-hidden bg-zinc-900">
                <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=1200" 
                     alt="Amanzoe Resort" 
                     class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000 scale-100 group-hover:scale-110 opacity-60 group-hover:opacity-100">
            </div>
            <div class="mt-8 flex justify-between items-baseline border-b border-white/5 pb-4">
                <div>
                    <span class="text-[8px] tracking-[0.4em] uppercase text-zinc-500 italic block mb-2">Greece</span>
                    <h3 class="text-xl font-light tracking-widest uppercase group-hover:serif group-hover:italic group-hover:lowercase transition-all">Amanzoe Resort</h3>
                </div>
                <span class="text-[10px] opacity-20 group-hover:opacity-100 transition-opacity">01</span>
            </div>
        </a>

        <a href="fourseasons.html" class="group block relative overflow-hidden mt-0 md:mt-24">
            <div class="aspect-[4/5] overflow-hidden bg-zinc-900">
                <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1200" 
                     alt="Four Seasons" 
                     class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000 scale-100 group-hover:scale-110 opacity-60 group-hover:opacity-100">
            </div>
            <div class="mt-8 flex justify-between items-baseline border-b border-white/5 pb-4">
                <div>
                    <span class="text-[8px] tracking-[0.4em] uppercase text-zinc-500 italic block mb-2">Mediterranean</span>
                    <h3 class="text-xl font-light tracking-widest uppercase group-hover:serif group-hover:italic group-hover:lowercase transition-all">Four Seasons</h3>
                </div>
                <span class="text-[10px] opacity-20 group-hover:opacity-100 transition-opacity">02</span>
            </div>
        </a>

    </div>
</main>

<script>
    // Menu Logic (Copy from Index)
    const btnOpen = document.getElementById('menu-open');
    const btnClose = document.getElementById('menu-close');
    const sideMenu = document.getElementById('side-menu');
    const menuItems = document.querySelectorAll('.menu-item');

    btnOpen.addEventListener('click', () => {
        sideMenu.classList.remove('translate-x-full');
        setTimeout(() => {
            menuItems.forEach(item => {
                item.classList.remove('opacity-0', 'translate-y-4');
                item.classList.add('opacity-100', 'translate-y-0');
            });
        }, 400);
    });

    btnClose.addEventListener('click', () => {
        sideMenu.classList.add('translate-x-full');
        menuItems.forEach(item => {
            item.classList.add('opacity-0', 'translate-y-4');
            item.classList.remove('opacity-100', 'translate-y-0');
        });
    });
</script>

</body>
</html>
