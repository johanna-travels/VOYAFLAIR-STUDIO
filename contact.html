<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Voyaflair</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        input:focus, textarea:focus { outline: none; border-color: #ffffff !important; }
        
        /* Animation για ομαλή εμφάνιση */
        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fade-up 1s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white antialiased min-h-screen py-20 px-6 flex flex-col items-center">

    <nav class="w-full max-w-4xl mb-16">
        <a href="index.html" class="text-[9px] tracking-[0.5em] uppercase opacity-60 hover:opacity-100 transition-opacity duration-500">
            ← Index
        </a>
    </nav>

    <main class="w-full max-w-2xl bg-zinc-900/40 border border-white/10 backdrop-blur-2xl p-8 md:p-16 rounded-sm shadow-2xl animate-fade-up relative">
        
        <header class="mb-16">
            <h1 class="text-5xl md:text-7xl font-bold tracking-tighter text-white serif italic leading-none mb-10">
                Let’s create <br>together.
            </h1>
            
            <div class="space-y-4">
                <h3 class="text-sm md:text-base font-light text-zinc-100 leading-relaxed">
                    Get in touch by filling out the form,<br>
                    or send me an email at <a href="mailto:voyaflair@gmail.com" class="text-white font-semibold underline underline-offset-4 hover:italic transition-all">voyaflair@gmail.com</a>
                </h3>
            </div>
        </header>

        <form id="contact-form" action="https://formspree.io/f/mlgpaobq" method="POST" class="space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-300 font-bold">First Name</label>
                    <input type="text" name="first_name" class="bg-transparent border-b border-white/30 py-2 text-white focus:border-white transition-colors">
                </div>
                
                <div class="flex flex-col space-y-2">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-300 font-bold">Last Name</label>
                    <input type="text" name="last_name" class="bg-transparent border-b border-white/30 py-2 text-white focus:border-white transition-colors">
                </div>
            </div>

            <div class="flex flex-col space-y-2">
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-300 font-bold">Email <span class="text-white">*</span></label>
                <input type="email" name="email" required class="bg-transparent border-b border-white/30 py-2 text-white focus:border-white transition-colors">
            </div>

            <div class="flex flex-col space-y-2">
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-300 font-bold">Subject</label>
                <input type="text" name="subject" class="bg-transparent border-b border-white/30 py-2 text-white focus:border-white transition-colors">
            </div>

            <div class="flex flex-col space-y-2">
                <label class="text-[10px] uppercase tracking-[0.2em] text-zinc-300 font-bold">Your Message <span class="text-white">*</span></label>
                <textarea name="message" required rows="5" class="bg-white/[0.05] border border-white/20 p-4 text-white focus:border-white transition-colors rounded-sm resize-none"></textarea>
            </div>

            <div class="pt-6">
                <button type="submit" id="submit-btn" class="w-full md:w-auto px-12 py-4 bg-white text-black text-[10px] uppercase tracking-[0.4em] font-bold hover:bg-zinc-200 transition-colors">
                    Send Message
                </button>
                <p id="status-msg" class="mt-4 text-[11px] text-green-400 uppercase tracking-widest hidden font-bold">
                    Message Sent Successfully
                </p>
            </div>

        </form>

    </main>

    <footer class="mt-12 flex gap-8 opacity-60">
        <a href="#" class="text-[9px] uppercase tracking-widest hover:text-white transition-colors">Instagram</a>
        <a href="#" class="text-[9px] uppercase tracking-widest hover:text-white transition-colors">TikTok</a>
        <a href="#" class="text-[9px] uppercase tracking-widest hover:text-white transition-colors">Facebook</a>
    </footer>

    <script>
        const form = document.getElementById("contact-form");
        const statusMsg = document.getElementById("status-msg");
        const submitBtn = document.getElementById("submit-btn");

        async function handleSubmit(event) {
            event.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";
            
            const data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    statusMsg.classList.remove('hidden');
                    form.reset();
                    submitBtn.innerText = "Send Message";
                    submitBtn.disabled = false;
                } else {
                    statusMsg.innerText = "Oops! Something went wrong.";
                    statusMsg.classList.remove('hidden');
                    statusMsg.classList.replace('text-green-400', 'text-red-400');
                    submitBtn.disabled = false;
                }
            }).catch(error => {
                statusMsg.innerText = "Error connecting to server.";
                statusMsg.classList.remove('hidden');
                statusMsg.classList.replace('text-green-400', 'text-red-400');
                submitBtn.disabled = false;
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>

</body>
</html>
